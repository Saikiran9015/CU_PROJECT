<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In | SkillTrackAI</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>

<body>

  <!-- NAVBAR -->
  <header class="navbar">
    <div class="nav-left">
      <div class="logo">
        <span class="logo-icon">🕒</span>
        <span class="logo-ai">🤖</span>
      </div>
      <h1 class="brand-title">SkillTrackAI</h1>
    </div>

    <div class="nav-right">
      <a href="signup.html" class="btn btn-outline">Sign Up</a>
      <a href="index.html" class="btn btn-primary">Home</a>
    </div>
  </header>


  <!-- SIGNIN SECTION -->
  <section class="auth">
    <div class="auth-card">

      <h2 class="auth-title">Welcome Back 👋</h2>
      <p class="auth-subtitle">
        Sign in to continue tracking your productivity and earning badges.
      </p>

      <form class="auth-form" id="signinForm">

        <div class="input-group">
          <label>Email</label>
          <input type="email" id="signinEmail" placeholder="Enter your email" required />
        </div>

        <div class="input-group">
          <label>Password</label>
          <input type="password" id="signinPassword" placeholder="Enter your password" required />
        </div>

        <button type="submit" class="btn btn-primary auth-btn">
          Sign In
        </button>

        <p class="auth-footer">
          Don’t have an account?
          <a href="signup.html">Create one</a>
        </p>

      </form>
    </div>
  </section>


  <script src="/static/script.js"></script>
</body>

</html>
